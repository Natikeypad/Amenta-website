services:
  mysql:
    image: mysql:8.4
    container_name: amenta-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: amenta
      MYSQL_USER: amenta
      MYSQL_PASSWORD: amenta
    volumes:
      - amenta_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  amenta_mysql_data:
